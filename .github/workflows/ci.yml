name: CI

# Triggers on every push and pull targeting main
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Run test suite
        runs-on: ubuntu-latest

        steps:
            # Step 1: Check out the repository contents onto the runner
            - name: Check out repository
              uses: actions/checkout@v4

            # Step 2: Install requested python version
            - name: Install python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"

            # Step 3: Cache pip downloads between runs
            - name: Cache pip downloads
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
                restore-keys: |
                  ${{ runner.os }}-pip-

            # Step 4: Install seqqc and dependencies
            - name: Install package and dev dependencies
              run: pip install -e ".[dev]"

            # Step 5: Run pytest
            - name: Run pytest
              run: pytest -v --tb=short
