name: Generate sample report

on:
    push:
        branches: [main]
        paths:	# Only regenerate when source or data changes
        - "src/**"
        - "data/**"
        - "pyproject.toml"

jobs:
    generate:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
        - name: Check out repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Install seqqc
          run: pip install -e .

        - name: Generate sample report
          run: |
            mkdir -p examples
            seqqc run data/reads/tiny_n_L001_R1_xxx.fastq.gz \
              --output examples/sample_report.html

        - name: Commit report if changed
          run: |
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add examples/sample_report.html
            git diff --staged --quiet || \
              git commit -m "docs: regenerate sample report [skip ci]"
            git push
